name: Enterprise API Performance Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual pipeline triggering with environment selectors

jobs:
  performance-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Engineering Repository
        uses: actions/checkout@v4

      - name: Setup Headless Performance Runner
        uses: grafana/setup-k6-action@v1

      - name: Execute Ramping Arrival Rate Execution (Staging Gate)
        run: |
          k6 run src/tests/booking.test.js \
            --env TARGET_ENV=production \
            --env TEST_NAME=pipeline-execution-report
        # Note: If target testing against sandboxes, switch variable maps to 'staging'

      - name: Archive Performance Test Reports
        uses: actions/upload-artifact@v4
        if: always() # Prevents loss of debugging charts if thresholds breach and step fails
        with:
          name: deployment-telemetry-charts
          path: reports/pipeline-execution-report.html
          retention-days: 30
